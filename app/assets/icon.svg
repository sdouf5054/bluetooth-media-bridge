<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1368" height="1347" viewBox="340 319 1368 1347">

  <!-- 카드 배경 -->
  <rect x="340" y="319" width="1368" height="1347" rx="130" ry="130" fill="#0082FC"/>

  <!--
    레이아웃:
    카드 내부: x=460~1650, y=460~1540
    중심: 1024, 992

    블루투스 중심: x=1270, y=992
    H=960: top=(1270,512), bot=(1270,1472)
    W=H*0.52=499: right=1270+250=1520, left=1270-250=1020
    꺾임 y = 512 + 960*0.44 = 512+422=934 → upperR=(1520,734), lowerR=(1520,1250)
    upperL=(1020,734), lowerL=(1020,1250)

    삼각형:
    - 정삼각형: 세로H=820, 가로W=H*(√3/2)=820*0.866=710 → 약 700
    - 왼쪽 끝: x=460
    - 오른쪽 꼭짓점: x=460+700=1160 → 블루투스 중심(1270) 왼쪽으로 약간 들어감
    - 중심y=992: 상단y=992-410=582, 하단y=992+410=1402
    → points: (460,582) (460,1402) (1160,992)
  -->

  <!-- ===== 재생 삼각형 ▷ (정삼각형, 블루투스 안으로 살짝 겹침) ===== -->
  <polygon
    points="530,705 530,1279 1020,992"
    fill="white"
    stroke="white"
    stroke-width="80"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- ===== 블루투스 심볼 ===== -->
  <g stroke="white" stroke-width="78" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="1270" y1="512" x2="1270" y2="1472"/>
    <polyline points="1270,512 1520,734 1270,992"/>
    <polyline points="1270,992 1520,1250 1270,1472"/>
    <line x1="1270" y1="992" x2="1020" y2="734"/>
    <line x1="1270" y1="992" x2="1020" y2="1250"/>
  </g>

</svg>
